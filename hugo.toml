baseURL = 'https://AAP-INLG.github.io/'
locale = 'en-us'
title = 'AAP 2026 — Alternative Architectures and Paradigms'
theme = 'github.com/gohugo-ananke/ananke/v2'

[module]
  [[module.imports]]
    path = "github.com/gohugo-ananke/ananke/v2"

[params]
  description = "A workshop on Alternative Architectures and Paradigms for Natural Language Generation, co-located with INLG 2026, Utrecht, Netherlands."
  featured_image = "/images/utrecht-netherlands.jpg"
  recent_posts_number = 0
  show_reading_time = false
  nav_title = "AAP 2026"

[params.ananke]
  show_recent_posts = false
  # To switch themes: change the [[module.imports]] path above and update this theme line.
  # Then run: hugo mod get <new-theme-module-path>

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Call for Papers"
    url = "/cfp/"
    weight = 2
  [[menus.main]]
    name = "Program"
    url = "/program/"
    weight = 3
  [[menus.main]]
    name = "Organizers"
    url = "/organizers/"
    weight = 4
